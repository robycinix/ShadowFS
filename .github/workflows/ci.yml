name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  daemon:
    name: Go daemon
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shadow_daemon
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: shadow_daemon/go.mod
          cache-dependency-path: shadow_daemon/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

  android:
    name: Android debug build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: shadow_client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug
