<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ShadowFS ghosting workflow</title>
  <desc id="desc">Detect inactive files, upload, verify, ghost locally, and restore on demand.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111C"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="line" x1="110" y1="0" x2="1090" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset=".5" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <style>
      .title{font:800 22px system-ui,-apple-system,Segoe UI,sans-serif;fill:#F8FAFC}
      .body{font:500 15px system-ui,-apple-system,Segoe UI,sans-serif;fill:#A7B7C8}
      .num{font:900 28px system-ui,-apple-system,Segoe UI,sans-serif;fill:#06111A}
    </style>
  </defs>
  <rect width="1200" height="320" rx="28" fill="url(#bg)"/>
  <path d="M120 160H1080" stroke="url(#line)" stroke-width="8" stroke-linecap="round" opacity=".7"/>
  <g>
    <circle cx="140" cy="160" r="52" fill="#0EA5E9"/>
    <text x="140" y="170" text-anchor="middle" class="num">1</text>
    <text x="140" y="245" text-anchor="middle" class="title">Detect</text>
    <text x="140" y="271" text-anchor="middle" class="body">cold local files</text>
  </g>
  <g>
    <circle cx="370" cy="160" r="52" fill="#22C55E"/>
    <text x="370" y="170" text-anchor="middle" class="num">2</text>
    <text x="370" y="245" text-anchor="middle" class="title">Upload</text>
    <text x="370" y="271" text-anchor="middle" class="body">resume over mTLS</text>
  </g>
  <g>
    <circle cx="600" cy="160" r="52" fill="#34D399"/>
    <text x="600" y="170" text-anchor="middle" class="num">3</text>
    <text x="600" y="245" text-anchor="middle" class="title">Verify</text>
    <text x="600" y="271" text-anchor="middle" class="body">SHA-256 + ACK</text>
  </g>
  <g>
    <circle cx="830" cy="160" r="52" fill="#38BDF8"/>
    <text x="830" y="170" text-anchor="middle" class="num">4</text>
    <text x="830" y="245" text-anchor="middle" class="title">Ghost</text>
    <text x="830" y="271" text-anchor="middle" class="body">free phone space</text>
  </g>
  <g>
    <circle cx="1060" cy="160" r="52" fill="#FB7185"/>
    <text x="1060" y="170" text-anchor="middle" class="num">5</text>
    <text x="1060" y="245" text-anchor="middle" class="title">Restore</text>
    <text x="1060" y="271" text-anchor="middle" class="body">hydrate on demand</text>
  </g>
</svg>
