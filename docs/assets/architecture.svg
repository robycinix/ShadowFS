<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ShadowFS architecture</title>
  <desc id="desc">Android phone sends verified file data through mutual TLS to a Raspberry Pi daemon with SQLite and local storage.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#081018"/>
      <stop offset="0.52" stop-color="#0B1720"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cyan" x1="160" y1="0" x2="1040" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.48" stop-color="#34D399"/>
      <stop offset="1" stop-color="#F43F5E"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#132231"/>
      <stop offset="1" stop-color="#0B121C"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.9 0 0 0 0 0.75 0 0 0 0.65 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label{font:700 28px system-ui,-apple-system,Segoe UI,sans-serif;fill:#E5F6FF}
      .sub{font:500 17px system-ui,-apple-system,Segoe UI,sans-serif;fill:#9FB3C8}
      .chip{font:700 14px system-ui,-apple-system,Segoe UI,sans-serif;fill:#BFFFE9}
      .tiny{font:600 13px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#7DD3FC}
    </style>
  </defs>

  <rect width="1200" height="520" rx="30" fill="url(#bg)"/>
  <path d="M72 420C210 260 330 290 470 245C625 195 675 110 850 105C965 102 1050 148 1132 88" stroke="url(#cyan)" stroke-width="2" opacity=".28"/>
  <path d="M88 448C220 322 368 342 516 276C662 211 704 173 850 173C965 173 1040 223 1120 168" stroke="url(#cyan)" stroke-width="2" opacity=".2"/>

  <rect x="68" y="72" width="312" height="376" rx="28" fill="url(#panel)" stroke="#244256"/>
  <rect x="110" y="112" width="228" height="296" rx="24" fill="#020817" stroke="#1F3446"/>
  <circle cx="224" cy="132" r="6" fill="#26394A"/>
