  <rect x="276" y="238" width="40" height="56" rx="12" fill="#143044" stroke="#25635E"/>
  <path d="M144 187H177M144 202H169M216 187H248M216 202H239M144 259H177M144 274H169M216 259H248M216 274H239" stroke="#7DD3FC" stroke-width="4" stroke-linecap="round" opacity=".72"/>
  <circle cx="224" cy="352" r="34" fill="#052B28" stroke="#34D399" stroke-width="6"/>
  <path d="M211 350L221 360L239 338" stroke="#BFFFE9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="224" y="472" text-anchor="middle" class="label">Android Client</text>
  <text x="224" y="498" text-anchor="middle" class="sub">Kotlin app + ForegroundService</text>

  <g filter="url(#glow)">
    <path d="M410 250C470 188 535 188 595 250C655 312 720 312 790 250" stroke="url(#cyan)" stroke-width="8" stroke-linecap="round"/>
    <path d="M410 295C490 245 560 245 640 295C705 336 746 328 790 295" stroke="#38BDF8" stroke-width="3" stroke-linecap="round" opacity=".65"/>
    <path d="M410 205C490 255 560 255 640 205C705 164 746 172 790 205" stroke="#34D399" stroke-width="3" stroke-linecap="round" opacity=".65"/>
  </g>
  <rect x="492" y="211" width="216" height="82" rx="22" fill="#06151F" stroke="#1B4D61"/>
  <text x="600" y="245" text-anchor="middle" class="chip">TLS 1.3 + mTLS</text>
  <text x="600" y="270" text-anchor="middle" class="tiny">SHA-256 verified stream</text>

