  <rect x="204" y="166" width="56" height="56" rx="12" fill="#10283A" stroke="#25506A"/>
  <rect x="276" y="166" width="40" height="56" rx="12" fill="#10283A" stroke="#25506A"/>
  <rect x="132" y="238" width="56" height="56" rx="12" fill="#143044" stroke="#25635E"/>
