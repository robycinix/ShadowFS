  <path d="M938 212C946 207 954 207 962 212M936 238C946 248 956 248 966 238" stroke="#34D399" stroke-width="5" stroke-linecap="round"/>
  <rect x="1016" y="162" width="28" height="18" rx="4" fill="#38BDF8"/>
  <rect x="1016" y="194" width="28" height="18" rx="4" fill="#38BDF8"/>
  <rect x="1016" y="226" width="28" height="18" rx="4" fill="#94A3B8"/>
  <rect x="1016" y="258" width="28" height="18" rx="4" fill="#94A3B8"/>
  <rect x="902" y="320" width="142" height="18" rx="6" fill="#0F172A" stroke="#334155"/>
  <rect x="902" y="350" width="142" height="18" rx="6" fill="#0F172A" stroke="#334155"/>
  <circle cx="1070" cy="330" r="5" fill="#22C55E"/>
  <circle cx="1070" cy="352" r="5" fill="#F43F5E"/>
  <text x="976" y="472" text-anchor="middle" class="label">Raspberry Pi Daemon</text>
  <text x="976" y="498" text-anchor="middle" class="sub">Go service + SQLite + local disk</text>

  <rect x="88" y="32" width="1024" height="34" rx="17" fill="#07131D" stroke="#1E3A4A"/>
  <text x="600" y="55" text-anchor="middle" class="tiny">Self-hosted file ghosting: phone storage gets lighter, original bytes stay on your hardware</text>
</svg>
