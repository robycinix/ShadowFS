syntax = "proto3";

package shadowfs;

option go_package = "shadowfs/daemon/proto";
option java_package = "com.shadowfs.client.proto";
option java_outer_classname = "ShadowMessageProto";

message ShadowMessage {
  enum Type {
    HANDSHAKE = 0;
    PULL_REQUEST = 1;
    PUSH_DATA = 2;
    SYNC_INDEX = 3;
    ACK = 4;
    ERROR = 5;
  }
  
  Type type = 1;
  string file_id = 2;        // UUID del file
  uint64 offset = 3;         // Offset in byte del chunk
  bytes payload = 4;         // Dati del chunk (max ~4MB)
  string checksum = 5;       // SHA-256 del chunk
  
  // Metadati opzionali usati durante SYNC_INDEX o HANDSHAKE
  FileMetadata metadata = 6;
}

message FileMetadata {
  string filename = 1;
  string rel_path = 2;
  int64 size = 3;
  string status = 4;
  string full_checksum = 5;
  int64 last_modified = 6;
  int64 last_access = 7;
}
